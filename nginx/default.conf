server {
    listen 80;
    server_name localhost;
    root /var/www/frontend/build;
    index index.html index.htm;

    # React dev server
    location / {
        proxy_pass http://node:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API запросы — напрямую в Laravel через FastCGI
    location /api {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
        include fastcgi_params;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param HTTP_PROXY "";
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Статические файлы Laravel
    location /storage {
        alias /var/www/backend/storage/app/public;
    }

    location /vendor {
        alias /var/www/backend/vendor;
    }

    error_log /var/log/nginx/project_error.log;
    access_log /var/log/nginx/project_access.log;
}