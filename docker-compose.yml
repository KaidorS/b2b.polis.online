version: '3.8'

services:
  # MySQL
  db:
    image: mysql:8.0
    container_name: project_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - project-network

  # PHP-FPM для Laravel
  app:
    build:
      context: ./php-fpm
      dockerfile: Dockerfile
    container_name: project_app
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - ./php-fpm/php.ini:/usr/local/etc/php/php.ini
    networks:
      - project-network
    depends_on:
      - db

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: project_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www/backend
      - ./frontend/build:/var/www/frontend/build  # для production-сборки фронта (опционально)
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - project-network
    depends_on:
      - app
      - node

  # Node.js для React (development сервер)
  node:
    image: node:22
    container_name: project_node
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    working_dir: /var/www/frontend
    volumes:
      - ./frontend:/var/www/frontend
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm start"
    networks:
      - project-network

networks:
  project-network:
    driver: bridge

volumes:
  db_data: